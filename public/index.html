<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dialed – 1 Color Mode</title>

<style>
body {
  background: #0e0e0e;
  color: white;
  font-family: monospace;
  text-align: center;
  padding: 2rem;
}

.color {
  width: 200px;
  height: 200px;
  margin: 2rem auto;
  border-radius: 12px;
}

.hidden {
  display: none;
}

button {
  padding: 10px 20px;
  margin: 5px;
  cursor: pointer;
}

input[type=range] {
  width: 80%;
}
</style>
</head>

<body>

<h1>🎯 Dialed – 1 Color</h1>

<div id="game">
  <div id="colorBox" class="color"></div>

  <div id="controls" class="hidden">
    <p>Rekonstruiere die Farbe:</p>

    H: <input type="range" id="h" min="0" max="359"><br>
    S: <input type="range" id="s" min="0" max="100"><br>
    B: <input type="range" id="b" min="0" max="100"><br>

    <button onclick="submit()">Fertig</button>
  </div>

  <h2 id="score"></h2>
</div>

<script>
// SETTINGS
let color;
let guess = {h:180,s:50,b:50};

// UTILS
function hsbToHex(h, s, b) {
  s/=100; b/=100;
  const k = n => (n + h/60)%6;
  const f = n => b - b*s*Math.max(0,Math.min(k(n),4-k(n),1));
  return "#" + [f(5),f(3),f(1)].map(x =>
    Math.round(x*255).toString(16).padStart(2,"0")
  ).join("");
}

function calcScore(a,b){
  const dh=Math.min(Math.abs(a.h-b.h),360-Math.abs(a.h-b.h));
  const ds=Math.abs(a.s-b.s);
  const db=Math.abs(a.b-b.b);
  const max=Math.sqrt(180*180+100*100+100*100);
  return Math.round((1-Math.sqrt(dh*dh+ds*ds+db*db)/max)*100);
}

// GAME
function start(){
  color = {
    h: Math.random()*360|0,
    s: Math.random()*60+30|0,
    b: Math.random()*50+30|0
  };

  document.getElementById("colorBox").style.background =
    hsbToHex(color.h,color.s,color.b);

  setTimeout(()=>{
    document.getElementById("colorBox").style.background="#222";
    document.getElementById("controls").classList.remove("hidden");
  },2000);
}

function submit(){
  guess = {
    h:+h.value,
    s:+s.value,
    b:+b.value
  };

  const sc = calcScore(color,guess);

  document.getElementById("colorBox").style.background =
    hsbToHex(color.h,color.s,color.b);

  document.getElementById("score").innerText =
    "Score: " + sc;

  setTimeout(start,2000);
}

// INIT
start();
</script>

</body>
</html>
